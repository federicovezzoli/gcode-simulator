name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.semantic-release.outputs.new-release-published }}
      new-release-version: ${{ steps.semantic-release.outputs.new-release-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release 2>&1 | tee release-output.txt

          if grep -qE "Published release|next release version" release-output.txt; then
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
            echo "new-release-published=true" >> $GITHUB_OUTPUT
            echo "new-release-version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "new-release-published=false" >> $GITHUB_OUTPUT
          fi

      - name: Close referenced issues
        if: steps.semantic-release.outputs.new-release-published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, skipping issue closing"
            exit 0
          fi

          COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --format='%s %b')
          ISSUE_NUMBERS=$(echo "$COMMITS" | grep -oiE '(fix|fixes|fixed|close|closes|closed|resolve|resolves|resolved|issue)\s+#[0-9]+' | grep -oE '#[0-9]+' | sed 's/#//' | sort -u)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "No issues referenced in commits"
            exit 0
          fi

          for ISSUE in $ISSUE_NUMBERS; do
            echo "Closing issue #$ISSUE"
            gh issue close $ISSUE --comment "Automatically closed by release v${{ steps.semantic-release.outputs.new-release-version }}

          See release notes: ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.semantic-release.outputs.new-release-version }}" || echo "Failed to close issue #$ISSUE"
          done

      - name: Add contributors to release
        if: steps.semantic-release.outputs.new-release-published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")

          if [ -z "$PREVIOUS_TAG" ]; then
            CONTRIBUTORS=$(git log --format='%an' | sort -u | sed 's/^/- /')
          else
            CONTRIBUTORS=$(git log ${PREVIOUS_TAG}..HEAD --format='%an' | sort -u | sed 's/^/- /')
          fi

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/v${{ steps.semantic-release.outputs.new-release-version }} --jq '.id')
          CURRENT_BODY=$(gh api repos/${{ github.repository }}/releases/${RELEASE_ID} --jq '.body')

          NEW_BODY=$(printf '%s\n\n---\n\n## Contributors\n\nThank you to everyone who contributed to this release!\n\n%s' "$CURRENT_BODY" "$CONTRIBUTORS")

          gh api repos/${{ github.repository }}/releases/${RELEASE_ID} \
            -X PATCH \
            -f body="$NEW_BODY"

  build:
    name: Build
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
